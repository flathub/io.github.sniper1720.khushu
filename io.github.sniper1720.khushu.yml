app-id: io.github.sniper1720.khushu
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
separate-locales: false
command: khushu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=LOCPATH=/app/usr/lib/locale
modules:
  - name: khushu
    buildsystem: meson
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/khushu/cargo
        CARGO_NET_OFFLINE: "true"
        CARGO_BUILD_OFFLINE: "true"
        GETTEXT_SYSTEM: "1"
      config-opts:
        - -Dgenerate_locales=auto
    sources:
      - type: archive
        url: https://github.com/sniper1720/khushu/archive/refs/tags/v1.2.1.tar.gz
        sha256: 35c2087393ec9e398b7eff3fe9118106ae95039b3df42f55fbc69c70a71820fa
      - cargo-sources.json
