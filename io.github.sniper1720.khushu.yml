app-id: io.github.sniper1720.khushu
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
separate-locales: false
command: khushu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
modules:
  - name: khushu
    buildsystem: meson
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/khushu/cargo
        CARGO_NET_OFFLINE: "true"
        CARGO_BUILD_OFFLINE: "true"
        GETTEXT_SYSTEM: "1"
    sources:
      - type: archive
        url: https://github.com/sniper1720/khushu/archive/refs/tags/v1.1.1.tar.gz
        sha256: c2efba738739b264078cbfc587b8b0dce0409e9d9c8d53b81b1ade0e1b9f9aed
      - cargo-sources.json
