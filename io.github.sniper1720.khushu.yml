app-id: io.github.sniper1720.khushu
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
separate-locales: false
command: khushu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: khushu
    buildsystem: meson
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/khushu/cargo
        CARGO_NET_OFFLINE: "true"
        CARGO_BUILD_OFFLINE: "true"
        GETTEXT_SYSTEM: "1"
    sources:
      - type: archive
        url: https://github.com/sniper1720/khushu/archive/refs/tags/v1.0.1.tar.gz
        sha256: f7770536900d11a12752756ca1c07b00d12dc148573d5107a3803ecfc4c4ff62
      - cargo-sources.json
